<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BridgeAid Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="./bridgeaid-mark.svg" alt="" width="44" height="44" />
        <div>
          <h1>BridgeAid Demo</h1>
          <p>可能符合，仍需承辦單位確認</p>
        </div>
      </div>
      <div class="status-pill" id="apiStatus" aria-live="polite">連線檢查中</div>
    </header>

    <main class="workspace">
      <section class="panel conversation-panel" aria-labelledby="chatTitle">
        <div class="panel-heading">
          <h2 id="chatTitle">對話試算</h2>
          <span class="session-label" id="sessionLabel"></span>
        </div>

        <div class="samples" aria-label="Demo 情境">
          <button type="button" data-sample="我住臺北，今年40歲，最近失業，有保勞保，房租快繳不出來，有租約，是邊緣戶">失業租屋</button>
          <button type="button" data-sample="我住台北，今年45歲，是低收入戶，爸爸住院失能，需要我照顧">住院照顧</button>
          <button type="button" data-sample="我住臺北，家裡火災，是中低收入戶">火災急難</button>
        </div>

        <ol class="messages" id="messages" aria-live="polite"></ol>

        <div class="quick-replies" id="quickReplies" aria-label="追問選項"></div>

        <form class="chat-form" id="chatForm">
          <label for="messageInput">生活情境</label>
          <textarea id="messageInput" name="message" rows="3" required>我住臺北，今年40歲，最近失業，有保勞保，房租快繳不出來，有租約，是邊緣戶</textarea>
          <button type="submit">送出</button>
        </form>
      </section>

      <section class="panel results-panel" aria-labelledby="resultsTitle">
        <div class="panel-heading">
          <h2 id="resultsTitle">推薦結果</h2>
          <button type="button" class="ghost-button" id="resetButton">重開 session</button>
        </div>
        <div id="resultSummary" class="empty-state">尚未送出情境</div>
        <div id="conflicts" class="conflicts" hidden></div>
        <div id="resultCards" class="result-cards"></div>
        <section class="checklist" aria-labelledby="checklistTitle">
          <h3 id="checklistTitle">文件清單</h3>
          <div id="documentChecklist" class="empty-state">尚無文件項目</div>
        </section>
      </section>

      <aside class="side-column">
        <section class="panel" aria-labelledby="sourceTitle">
          <div class="panel-heading">
            <h2 id="sourceTitle">來源追溯</h2>
            <button type="button" class="ghost-button" id="refreshServices">更新</button>
          </div>
          <div id="serviceList" class="service-list" aria-live="polite"></div>
        </section>

        <section class="panel" aria-labelledby="reminderTitle">
          <h2 id="reminderTitle">提醒</h2>
          <p class="meta">提醒為 opt-in；到期後由系統送達（未接 LINE 時以狀態「已送達」模擬）。</p>
          <form id="reminderForm" class="reminder-form">
            <label for="reminderType">類型</label>
            <select id="reminderType" name="reminder_type">
              <option value="document">補件</option>
              <option value="deadline">期限</option>
              <option value="renewal">續辦</option>
              <option value="eligibility">即將符合</option>
            </select>

            <label for="scheduledAt">時間</label>
            <input id="scheduledAt" name="scheduled_at" type="datetime-local" required />

            <label for="channel">通道</label>
            <select id="channel" name="channel">
              <option value="line">LINE</option>
              <option value="email">Email</option>
            </select>

            <label for="note">備註</label>
            <input id="note" name="note" type="text" maxlength="80" />

            <label class="checkbox-line" for="consent">
              <input id="consent" name="consent" type="checkbox" />
              <span>同意建立提醒</span>
            </label>

            <button type="submit">建立提醒</button>
          </form>
          <div id="reminderStatus" class="form-status" aria-live="polite"></div>
          <div id="reminderList" class="reminder-list"></div>
        </section>
      </aside>
    </main>

    <dialog id="sourceDialog">
      <article class="dialog-body">
        <div class="panel-heading">
          <h2 id="dialogTitle">來源</h2>
          <button type="button" class="icon-button" id="closeDialog" aria-label="關閉">✕</button>
        </div>
        <div id="sourceDetail"></div>
      </article>
    </dialog>

    <script src="./app.js" type="module"></script>
  </body>
</html>
